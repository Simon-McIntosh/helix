<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 260" font-family="system-ui,-apple-system,sans-serif" role="img" aria-label="Core contracts plus appended project overlays; a full replacement is flagged as drift">
  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#1a1a1a"/>
    </marker>
  </defs>

  <!-- core -->
  <rect x="20" y="40" width="220" height="88" rx="6" fill="#fff" stroke="#333"/>
  <rect x="20" y="40" width="220" height="4" rx="2" fill="#2563eb"/>
  <text x="130" y="66" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a1a">core contract</text>
  <text x="130" y="86" text-anchor="middle" font-size="11" fill="#444">prompts/&lt;phase&gt;.md</text>
  <text x="130" y="104" text-anchor="middle" font-size="10" fill="#777">shared, versioned, project-agnostic</text>

  <!-- overlay -->
  <rect x="20" y="160" width="220" height="70" rx="6" fill="#fff" stroke="#16a34a"/>
  <text x="130" y="184" text-anchor="middle" font-size="13" font-weight="600" fill="#16a34a">project overlay</text>
  <text x="130" y="202" text-anchor="middle" font-size="11" fill="#444">&lt;project&gt;/prompts/overlay.&lt;phase&gt;.md</text>
  <text x="130" y="218" text-anchor="middle" font-size="10" fill="#777">small data diff — appended</text>

  <!-- resolve -->
  <line x1="240" y1="84" x2="356" y2="110" stroke="#1a1a1a" stroke-width="1.2" marker-end="url(#a)"/>
  <line x1="240" y1="195" x2="356" y2="130" stroke="#16a34a" stroke-width="1.2" marker-end="url(#a)"/>
  <rect x="360" y="84" width="190" height="72" rx="6" fill="#f8fafc" stroke="#94a3b8"/>
  <text x="455" y="112" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a1a">resolve_prompt</text>
  <text x="455" y="132" text-anchor="middle" font-size="11" fill="#444">core + blank line + overlay</text>

  <line x1="550" y1="120" x2="640" y2="120" stroke="#1a1a1a" stroke-width="1.2" marker-end="url(#a)"/>
  <rect x="644" y="94" width="190" height="52" rx="6" fill="#fff" stroke="#333"/>
  <text x="739" y="116" text-anchor="middle" font-size="12" font-weight="600" fill="#1a1a1a">composed phase prompt</text>
  <text x="739" y="134" text-anchor="middle" font-size="10" fill="#777">what the worker reads</text>

  <!-- drift -->
  <rect x="360" y="190" width="474" height="46" rx="6" fill="#fff" stroke="#dc2626" stroke-dasharray="4 3"/>
  <text x="380" y="209" font-size="12" font-weight="600" fill="#dc2626">helix check — drift flagged, never resolved:</text>
  <text x="380" y="226" font-size="10.5" fill="#444">full prompts/&lt;phase&gt;.md replacement · restated core headings · overlay &gt; core · bad gates</text>
</svg>
