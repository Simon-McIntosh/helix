[project]
name = "helix"
version = "0.0.0"
description = "A long-horizon agent orchestrator: a dumb plan-implement-judge loop around a smart native worker."
readme = "README.md"
requires-python = ">=3.13"
license = { text = "CC BY-ND 4.0" }
license-files = ["LICENSE"]
authors = [{ name = "Simon McIntosh", email = "simon.mcintosh@iter.org" }]
keywords = [
    "agent",
    "orchestration",
    "llm",
    "long-running",
    "plan-implement-judge",
]
classifiers = [
    "License :: Other/Proprietary License",
    "Programming Language :: Python :: 3.13",
    "Intended Audience :: Developers",
    "Topic :: Software Development :: Libraries :: Application Frameworks",
]
dependencies = [
    "typer>=0.12",
    "rich>=13.7",
    "pydantic>=2.7",
    "pyyaml>=6.0",
    "jinja2>=3.1",
]

[project.scripts]
helix = "helix.cli:app"

[project.urls]
Homepage = "https://github.com/Simon-McIntosh/helix"
Repository = "https://github.com/Simon-McIntosh/helix"

[dependency-groups]
dev = [
    "pytest>=8.2",
    "ruff>=0.5",
    "linkml>=1.8",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["helix"]

[tool.ruff]
line-length = 88
target-version = "py313"
# helix/models.py is generated from schema/helix.yaml by gen-pydantic — its
# formatting is owned by the generator, so it is excluded from lint and format.
extend-exclude = ["helix/models.py"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "W"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
