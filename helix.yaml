# Helix self-hosting run configuration.
#
# This is the project data for running Helix's own development loop on Helix
# itself: `helix run .` from the repo root. It is *not* core code — it is the
# values the project-agnostic core reads (see helix/config.py for the shape).
#
# The near-term milestone is self-hosting: Helix drives its own increments
# through its own plan->implement->judge loop, with its test suite as the fast
# surrogate oracle.

# Working directory for the worker and the gates (relative to this file).
repo: "."

# The agreed plan (the signed contract) composed into the implement prompt.
# Markdown is the source of truth; the reckon HTML in docs/ is a rendered lens.
plan: docs/specs/2026-06-30-helix-bootstrap-design.md

# How to invoke the native worker. The composed prompt is fed on stdin; the
# worker uses its own tools, skills, and edit format (model-harness fit — Helix
# never reimplements the worker's tool surface). For a fully autonomous inner
# loop the operator may add a permission flag (e.g. `--permission-mode`,
# `acceptEdits`) so edits land without prompting.
worker:
  command: ["claude", "-p"]
  timeout_s: 1800

# Bounds that halt the loop independent of the oracle.
caps:
  max_iterations: 8

# The tiered completion oracle. Surrogate gates run every iteration as
# backpressure; a failing surrogate returns `fail` and the loop iterates.
gates:
  - id: tests
    name: surrogate oracle (pytest)
    tier: surrogate
    criterion: the full test suite passes
    command: "uv run pytest -q"
  - id: lint
    name: ruff lint
    tier: surrogate
    criterion: ruff reports no lint errors
    command: "uv run ruff check ."
